{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Pixels &amp; Code Studios — We build brands that move{% endblock %}</title>
  <meta name="description" content="Pixels & Code Studios — websites, apps, content, personal branding, video editing, sales and marketing under one roof.">
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <!-- film grain overlay -->
  <div class="grain" aria-hidden="true"></div>

  <!-- custom cursor -->
  <div class="cursor" aria-hidden="true"><span class="cursor-label"></span></div>

  {% block content %}{% endblock %}

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>
  <script src="{% static 'js/main.js' %}" defer></script>
</body>
</html>
